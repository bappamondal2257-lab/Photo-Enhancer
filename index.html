<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo In Hands - 4K Enhancer</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-lg w-full glass-panel rounded-3xl shadow-2xl overflow-hidden p-6 text-center">
        
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 mb-2">Photo In Hands</h1>
            <p class="text-slate-400 text-sm">Offline 2K / 4K Photo Enhancer</p>
        </div>

        <div class="flex justify-center gap-4 mb-6">
            <label class="cursor-pointer">
                <input type="radio" name="quality" value="2k" checked class="peer sr-only">
                <div class="px-4 py-2 rounded-xl border border-slate-600 text-slate-300 peer-checked:bg-purple-600 peer-checked:border-purple-500 peer-checked:text-white transition-all font-bold">2K (FHD+)</div>
            </label>
            <label class="cursor-pointer">
                <input type="radio" name="quality" value="4k" class="peer sr-only">
                <div class="px-4 py-2 rounded-xl border border-slate-600 text-slate-300 peer-checked:bg-pink-600 peer-checked:border-pink-500 peer-checked:text-white transition-all font-bold">4K (Ultra HD)</div>
            </label>
        </div>

        <div id="uploadArea" class="border-2 border-dashed border-slate-600 rounded-2xl p-8 hover:border-purple-400 hover:bg-slate-800 transition-all cursor-pointer" onclick="document.getElementById('uploadInput').click()">
            <svg class="mx-auto h-12 w-12 text-slate-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            <p class="text-slate-300 font-medium text-lg">Select a Normal Photo</p>
            <input type="file" id="uploadInput" accept="image/jpeg, image/png" class="hidden" onchange="processImage()">
        </div>

        <div id="processingMsg" class="hidden mt-6 text-purple-400 font-bold animate-pulse">
            <p class="text-lg">Enhancing Photo to Pro Quality... ⏳</p>
            <p class="text-sm font-normal text-slate-400 mt-1">Applying smart contrast & upscaling</p>
        </div>

        <div id="resultSection" class="hidden mt-6 fade-in">
            <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700">
                <h3 class="text-green-400 font-bold text-lg mb-2">Enhancement Complete!</h3>
                
                <div class="flex justify-between text-sm text-slate-400 mb-4 px-2">
                    <span>Original: <span id="oldRes" class="text-white font-bold"></span></span>
                    <span>New: <span id="newRes" class="text-purple-400 font-bold"></span></span>
                </div>

                <img id="outputImg" class="max-h-56 mx-auto rounded-xl shadow-lg border border-slate-600 mb-6 object-contain">

                <a id="downloadLink" download="PhotoInHands_Enhanced.jpg" class="block w-full">
                    <button class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-3 px-4 rounded-xl transition duration-300 shadow-lg shadow-purple-500/30">
                        Download Enhanced Photo
                    </button>
                </a>
            </div>
            <button onclick="location.reload()" class="mt-4 text-slate-400 hover:text-white text-sm underline">Enhance Another Photo</button>
        </div>

    </div>

    <script>
        function processImage() {
            const fileInput = document.getElementById('uploadInput');
            if (!fileInput.files[0]) return;

            // UI Changes
            document.getElementById('uploadArea').classList.add('hidden');
            document.getElementById('processingMsg').classList.remove('hidden');

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // Small delay to allow UI to show "Processing..."
                    setTimeout(() => enhancePhoto(img), 100);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function enhancePhoto(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // 1. Get Target Resolution
            const qualitySelected = document.querySelector('input[name="quality"]:checked').value;
            let targetWidth = qualitySelected === '4k' ? 3840 : 2560; 
            
            const ratio = img.height / img.width;
            let targetHeight = Math.round(targetWidth * ratio);

            if (img.width > targetWidth) {
                targetWidth = img.width;
                targetHeight = img.height;
            }

            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // 2. Apply Filters 
            ctx.filter = 'contrast(1.1) saturate(1.15) brightness(1.02)';
            
            // 3. High Quality Upscaling
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            ctx.drawImage(img, 0, 0, targetWidth, targetHeight);

            canvas.toBlob(function(blob) {
                document.getElementById('processingMsg').classList.add('hidden');
                
                const url = URL.createObjectURL(blob);
                document.getElementById('outputImg').src = url;
                document.getElementById('downloadLink').href = url;
                
                document.getElementById('oldRes').innerText = `${img.width}x${img.height}`;
                document.getElementById('newRes').innerText = `${targetWidth}x${targetHeight}`;
                
                document.getElementById('resultSection').classList.remove('hidden');
            }, 'image/jpeg', 1.0);
        }
    </script>
</body>
</html>
